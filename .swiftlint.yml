# 需要检查的目录
included:
  - VirtualTryOn

# 不检查的目录
excluded:
  - Pods
  - Carthage
  - .build
  - DerivedData

opt_in_rules:
  - empty_count
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - operator_usage_whitespace
  - overridden_super_call
  - redundant_nil_coalescing
  - sorted_imports
  - vertical_parameter_alignment
  - yoda_condition

disabled_rules:
  - todo

line_length:
  warning: 140
  error: 180
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 600
  error: 1000

type_body_length:
  warning: 400
  error: 600

function_body_length:
  warning: 80
  error: 120

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - e
    - i
    - j
    - k
    - n
    - x
    - y
    - z
    - id

type_name:
  min_length:
    warning: 2

cyclomatic_complexity:
  warning: 15
  error: 25

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 2
